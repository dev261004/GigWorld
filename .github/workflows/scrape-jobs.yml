name: GigWorld Scheduled Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: gigworld-scraper-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape:
    name: Run scraper lifecycle sync
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      DB_NAME: ${{ secrets.DB_NAME }}
      PYTHON_BIN: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate MongoDB secret
        run: |
          if [ -z "$MONGODB_URL" ]; then
            echo "MONGODB_URL secret is required."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scraper/requirements.txt

      - name: Run one scraper sync
        working-directory: backend
        run: npm run scrape:once
